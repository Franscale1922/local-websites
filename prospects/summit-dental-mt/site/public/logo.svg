<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 240" fill="none">
  <!-- Badge outer shape -->
  <path d="M20 50 Q20 10 60 10 L280 10 Q320 10 320 50 L320 160 Q320 220 170 232 Q20 220 20 160 Z" fill="#1a1aff"/>
  <!-- Gold outline -->
  <path d="M20 50 Q20 10 60 10 L280 10 Q320 10 320 50 L320 160 Q320 220 170 232 Q20 220 20 160 Z" fill="none" stroke="#F5A623" stroke-width="7"/>
  <!-- Inner gold inset border -->
  <path d="M34 54 Q34 24 66 24 L274 24 Q306 24 306 54 L306 158 Q306 210 170 220 Q34 210 34 158 Z" fill="none" stroke="#F5A623" stroke-width="3"/>

  <!-- PREMIER text -->
  <text x="170" y="90" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="58" fill="#F5A623" text-anchor="middle" letter-spacing="-1">PREMIER</text>

  <!-- ELECTRICAL SERVICES text -->
  <text x="170" y="122" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="23" fill="#ffffff" text-anchor="middle" letter-spacing="1">ELECTRICAL SERVICES</text>

  <!-- Left lightning bolt -->
  <polygon points="62,165 82,140 90,155 108,130 88,155 80,140" fill="#F5A623"/>
  <!-- Right lightning bolt -->
  <polygon points="278,165 258,140 250,155 232,130 252,155 260,140" fill="#F5A623"/>

  <!-- Plug icon center -->
  <g transform="translate(148,130)">
    <!-- Plug body -->
    <rect x="10" y="5" width="24" height="28" rx="3" fill="#F5A623"/>
    <!-- Plug prong left -->
    <rect x="14" y="-6" width="6" height="14" rx="2" fill="#F5A623"/>
    <!-- Plug prong right -->
    <rect x="24" y="-6" width="6" height="14" rx="2" fill="#F5A623"/>
    <!-- Cord -->
    <path d="M22 33 Q22 52 22 60" stroke="#F5A623" stroke-width="5" stroke-linecap="round"/>
    <!-- Cord curl left -->
    <path d="M22 60 Q8 60 8 72" stroke="#F5A623" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Left bolt arm connecting to plug -->
    <line x1="-30" y1="28" x2="10" y2="28" stroke="#F5A623" stroke-width="3"/>
    <!-- Right bolt arm connecting to plug -->
    <line x1="34" y1="28" x2="74" y2="28" stroke="#F5A623" stroke-width="3"/>
  </g>
</svg>
